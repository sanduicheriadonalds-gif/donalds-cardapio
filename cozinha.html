<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cozinha — Donalds'</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--azul:#0d2654;--ouro:#f5c518;--bg:#0a0a0a;--card:#161616;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--radius:14px}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:#111;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;letter-spacing:3px}
  .logo span{color:var(--ouro)}
  .header-right{display:flex;align-items:center;gap:16px}
  .hora{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ouro);letter-spacing:2px}
  .atualizar-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
  .atualizar-btn:hover{border-color:var(--ouro);color:var(--ouro)}
  .colunas{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px;min-height:calc(100vh - 64px)}
  .coluna-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .coluna-titulo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
  .coluna-titulo.novo{color:#f59e0b}
  .coluna-titulo.preparo{color:#60a5fa}
  .coluna-titulo.pronto{color:#4ade80}
  .coluna-count{font-size:12px;background:var(--border);color:var(--muted);padding:3px 10px;border-radius:20px;font-weight:700}
  .cards{display:flex;flex-direction:column;gap:10px;min-height:100px}
  .pedido{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .3s}
  .pedido.novo{border-left:3px solid #f59e0b}
  .pedido.preparo{border-left:3px solid #60a5fa}
  .pedido.pronto{border-left:3px solid #4ade80}
  .pedido-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .p-num{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
  .p-num.novo{color:#f59e0b}
  .p-num.preparo{color:#60a5fa}
  .p-num.pronto{color:#4ade80}
  .p-mesa{font-size:12px;color:var(--muted)}
  .p-pgto{font-size:11px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:10px}
  .pedido-itens{padding:12px 14px}
  .item-linha{font-size:13px;color:var(--text);padding:4px 0;border-bottom:1px solid #1e1e1e;display:flex;align-items:baseline;gap:8px}
  .item-linha:last-child{border-bottom:none}
  .item-qty{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--ouro)}
  .obs{font-size:11px;color:#f59e0b;background:#1c1800;padding:6px 10px;border-radius:6px;margin:6px 14px 10px}
  .pedido-foot{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
  .p-total{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);letter-spacing:1px}
  .p-tempo{font-size:11px;color:var(--muted)}
  .acao-btn{padding:7px 16px;border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
  .acao-btn.iniciar{background:#1e3a5f;color:#60a5fa}
  .acao-btn.iniciar:hover{background:#2a4f7f}
  .acao-btn.pronto{background:#14532d;color:#4ade80}
  .acao-btn.pronto:hover{background:#166534}
  .acao-btn.entregue{background:#1e1e1e;color:#666}
  .acao-btn.entregue:hover{background:#2a2a2a;color:#999}
  .item-receita{padding:2px 0 6px 24px;display:flex;flex-wrap:wrap;gap:4px}
  .receita-tag{font-size:10px;background:#1e1e1e;color:#888;padding:2px 7px;border-radius:10px;border:1px solid #2a2a2a}
  .receita-tag.adicional{background:#1c1800;color:#f59e0b;border-color:#3a3000}
  .novo-alerta{position:fixed;top:80px;right:20px;background:#f59e0b;color:#000;padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;display:none;z-index:999;animation:fadeIn .3s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:900px){.colunas{grid-template-columns:1fr;padding:12px}}

  /* LOGIN */
  #tela-login{position:fixed;inset:0;background:var(--azul);display:flex;align-items:center;justify-content:center;z-index:999}
  .login-box{background:#111;border-radius:20px;padding:36px 32px;width:100%;max-width:340px;text-align:center;border:1px solid var(--border)}
  .login-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:3px;margin-bottom:2px}
  .login-sub{font-size:10px;color:var(--ouro);letter-spacing:4px;margin-bottom:24px;text-transform:uppercase}
  .login-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:#1a1a1a;color:#fff;margin-bottom:10px;transition:border-color .2s}
  .login-input:focus{border-color:var(--ouro)}
  .login-btn{width:100%;padding:13px;background:var(--ouro);color:#000;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
  .login-btn:hover{opacity:.9}
  .login-erro{color:#ef4444;font-size:12px;margin-top:8px;display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-box">
    <div class="login-logo">DONALDS'</div>
    <div class="login-sub">Cozinha</div>
    <input class="login-input" type="text" id="login-user" placeholder="Usuário"/>
    <input class="login-input" type="password" id="login-senha" placeholder="Senha"/>
    <button class="login-btn" id="btn-login">ENTRAR</button>
    <div class="login-erro" id="login-erro">Usuário ou senha incorretos.</div>
  </div>
</div>

<div class="header">
  <div class="logo">DONALDS' <span>COZINHA</span></div>
  <div class="header-right">
    <div class="hora" id="hora">00:00</div>
    <button class="atualizar-btn" id="btn-sair-cozinha" style="border-color:rgba(245,197,24,.3);color:var(--ouro)" onclick="localStorage.removeItem('donalds_cozinha_user');location.reload()">Sair</button>
  </div>
</div>

<div class="colunas">
  <div>
    <div class="coluna-header">
      <div class="coluna-titulo novo">NOVOS</div>
      <div class="coluna-count" id="cnt-novo">0</div>
    </div>
    <div class="cards" id="col-novo"></div>
  </div>
  <div>
    <div class="coluna-header">
      <div class="coluna-titulo preparo">EM PREPARO</div>
      <div class="coluna-count" id="cnt-preparo">0</div>
    </div>
    <div class="cards" id="col-preparo"></div>
  </div>
  <div>
    <div class="coluna-header">
      <div class="coluna-titulo pronto">PRONTOS</div>
      <div class="coluna-count" id="cnt-pronto">0</div>
    </div>
    <div class="cards" id="col-pronto"></div>
  </div>
</div>

<div class="novo-alerta" id="novo-alerta">Novo pedido chegou!</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAoZdHN5ZEvZ-HXaUh9kqPifsShnMZclM8",
    authDomain: "donals-e00f4.firebaseapp.com",
    projectId: "donals-e00f4",
    storageBucket: "donals-e00f4.firebasestorage.app",
    messagingSenderId: "391280941743",
    appId: "1:391280941743:web:1f9db3a7dc69896b0c125a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ===== LOGIN =====
  const USUARIOS_FIXOS = { 'admin': 'donalds2024', 'gerente': 'gerente123' };

  function entrarCozinha(nome) {
    document.getElementById('tela-login').style.display = 'none';
    localStorage.setItem('donalds_cozinha_user', nome);
  }

  function fazerLogin() {
    const user = document.getElementById('login-user').value.trim().toLowerCase();
    const senha = document.getElementById('login-senha').value;
    if (USUARIOS_FIXOS[user] && USUARIOS_FIXOS[user] === senha) { entrarCozinha(user); return; }
    getDocs(collection(db,'funcionarios')).then(snap => {
      const func = snap.docs.map(d=>({id:d.id,...d.data()}))
        .find(f => f.usuario === user && f.status === 'ativo');
      if (!func) { document.getElementById('login-erro').style.display = 'block'; return; }
      let senhaOk = false;
      try { senhaOk = decodeURIComponent(escape(atob(func.senha||''))) === senha; } catch(e) { senhaOk = false; }
      if (!senhaOk) { document.getElementById('login-erro').style.display = 'block'; return; }
      if (!['cozinheiro','admin','gerente'].includes(func.perfil)) {
        document.getElementById('login-erro').textContent = 'Seu perfil não tem acesso à cozinha.';
        document.getElementById('login-erro').style.display = 'block';
        return;
      }
      entrarCozinha(func.nome);
    });
  }

  const salvo = localStorage.getItem('donalds_cozinha_user');
  if (salvo) entrarCozinha(salvo);

  document.getElementById('btn-login').addEventListener('click', fazerLogin);
  document.getElementById('login-senha').addEventListener('keydown', e => { if(e.key==='Enter') fazerLogin(); });

  // Relógio
  setInterval(() => {
    document.getElementById('hora').textContent = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }, 1000);

  const fmt = v => 'R$ ' + Number(v).toFixed(2).replace('.',',');

  const tempo = ts => {
    if (!ts) return '';
    const diff = Math.floor((Date.now() - ts.toDate().getTime()) / 60000);
    if (diff < 1) return '<span style="color:#4ade80">agora</span>';
    if (diff < 10) return `<span style="color:#4ade80">${diff} min</span>`;
    if (diff < 20) return `<span style="color:#f59e0b">${diff} min ⚠</span>`;
    return `<span style="color:#ef4444">${diff} min !</span>`;
  };

  // Som de notificação
  function tocarSom() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [440, 550, 660].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.3);
      });
    } catch(e) {}
  }

  // Cache do cardápio para pegar receitas
  let cardapioMap = {};

  async function carregarCardapioCache() {
    const snap = await getDocs(collection(db,'cardapio'));
    snap.docs.forEach(d => { cardapioMap[d.id] = d.data(); });
    // Também indexa por nome (lowercase) para fallback
    snap.docs.forEach(d => { cardapioMap[d.data().nome?.toLowerCase()] = d.data(); });
  }

  function getReceita(item) {
    // Tenta pelo id primeiro, depois pelo nome
    const card = cardapioMap[item.id] || cardapioMap[item.nome?.toLowerCase()];
    return card?.receita || [];
  }

  function renderIngredientes(item) {
    const receita = getReceita(item);
    const adicionais = item.adicionais || [];
    if (!receita.length && !adicionais.length) return '';

    const tags = receita.map(r =>
      `<span class="receita-tag">${r.quantidade} ${r.unidadeUso||r.unidade} ${r.nome}</span>`
    ).join('');
    const addTags = adicionais.map(a =>
      `<span class="receita-tag adicional">+ ${a.nome}</span>`
    ).join('');
    return `<div class="item-receita">${tags}${addTags}</div>`;
  }

  let ultimoCount = 0;
  let primeiraCarregada = false;

  function renderPedidos(pedidos) {
    const grupos = {novo:[], preparo:[], pronto:[]};
    pedidos.forEach(p => { if (grupos[p.status]) grupos[p.status].push(p); });

    if (primeiraCarregada && grupos.novo.length > ultimoCount) {
      const alerta = document.getElementById('novo-alerta');
      alerta.style.display = 'block';
      setTimeout(() => alerta.style.display = 'none', 4000);
      tocarSom();
    }
    ultimoCount = grupos.novo.length;
    primeiraCarregada = true;

    document.getElementById('cnt-novo').textContent = grupos.novo.length;
    document.getElementById('cnt-preparo').textContent = grupos.preparo.length;
    document.getElementById('cnt-pronto').textContent = grupos.pronto.length;

    ['novo','preparo','pronto'].forEach(status => {
      const col = document.getElementById('col-' + status);
      if (!grupos[status].length) {
        col.innerHTML = `<div class="vazio">Nenhum pedido aqui</div>`;
        return;
      }
      const ordenados = [...grupos[status]].sort((a,b) => (a.criadoEm?.seconds||0) - (b.criadoEm?.seconds||0));
      col.innerHTML = ordenados.map(p => {
        const itensHtml = (p.itens||[]).map(i => `
          <div class="item-linha">
            <span class="item-qty">${i.quantidade}x</span>
            <span>${i.nome}</span>
          </div>
          ${renderIngredientes(i)}`
        ).join('');
        const obsHtml = p.observacoes ? `<div class="obs">Obs: ${p.observacoes}</div>` : '';
        const acao = status === 'novo'
          ? `<button class="acao-btn iniciar" onclick="window._upStatus('${p.id}','preparo')">Iniciar preparo</button>`
          : status === 'preparo'
          ? `<button class="acao-btn pronto" onclick="window._upStatus('${p.id}','pronto')">Marcar pronto</button>`
          : `<button class="acao-btn entregue" onclick="window._upStatus('${p.id}','entregue_mesa')">Entregue na mesa ✓</button>`;
        return `<div class="pedido ${status}">
          <div class="pedido-head">
            <div>
              <div class="p-num ${status}">#${p.id.slice(-4).toUpperCase()}</div>
              <div class="p-mesa">Mesa ${p.mesa}</div>
            </div>
            <div style="text-align:right">
              <div class="p-pgto">${p.pagamento||'—'}</div>
              <div class="p-tempo" style="margin-top:4px">${tempo(p.criadoEm)}</div>
            </div>
          </div>
          <div class="pedido-itens">${itensHtml}</div>
          ${obsHtml}
          <div class="pedido-foot">
            <span class="p-total">${fmt(p.total||0)}</span>
            ${acao}
          </div>
        </div>`;
      }).join('');
    });
  }

  // Carrega receitas e depois ouve pedidos em tempo real
  carregarCardapioCache().then(() => {
    onSnapshot(collection(db,'pedidos'), snap => {
      const pedidos = snap.docs
        .map(d => ({id:d.id,...d.data()}))
        .filter(p => p.status !== 'entregue' && p.status !== 'entregue_mesa')
        .sort((a,b) => (b.criadoEm?.seconds||0) - (a.criadoEm?.seconds||0))
        .slice(0, 40);
      renderPedidos(pedidos);
    });
  });

  window._upStatus = async (id, status) => {
    await updateDoc(doc(db,'pedidos',id), { status });
  };

  // Recarrega receitas a cada 5 min (caso admin atualize o cardápio)
  setInterval(carregarCardapioCache, 300000);
</script>
</body>
</html>
